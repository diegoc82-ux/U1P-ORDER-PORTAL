<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ultra1Plus — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="approved_customers.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #000000;
      --gold:   #FFC700;
      --white:  #ffffff;
      --gray-1: #f6f6f6;
      --gray-2: #e5e5e5;
      --gray-3: #999999;
      --gray-4: #333333;
      --red:    #cc2200;
    }

    body {
      font-family: 'Inter', 'Rubik', sans-serif;
      background: var(--gray-1);
      color: var(--gray-4);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--black);
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 80px;
      border-bottom: 3px solid var(--gold);
    }
    header .logo img { height: 48px; display: block; }
    header .page-title {
      font-family: 'Rubik', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      color: var(--white);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    header .page-title span { color: var(--gold); }

    /* ── Center layout ── */
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .login-box {
      background: var(--white);
      border-top: 4px solid var(--gold);
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0,0,0,.10);
    }
    .login-head {
      background: var(--black);
      padding: 20px 32px;
    }
    .login-head h2 {
      font-family: 'Rubik', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--white);
    }
    .login-body { padding: 32px; }

    /* ── Form ── */
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    label {
      font-family: 'Rubik', sans-serif;
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray-3);
    }
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 14px;
      border: 2px solid var(--gray-2);
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      color: var(--gray-4);
      outline: none;
      transition: border-color .15s;
      background: #fff;
    }
    input:focus { border-color: var(--gold); }

    /* ── Button ── */
    .btn-signin {
      width: 100%;
      padding: 16px;
      background: var(--gold);
      color: var(--black);
      border: none;
      font-family: 'Rubik', sans-serif;
      font-size: .95rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      clip-path: polygon(12% 0, 100% 0%, 88% 100%, 0% 100%);
      transition: filter .15s;
      margin-top: 8px;
    }
    .btn-signin:hover { filter: brightness(1.06); }
    .btn-signin:active { transform: translateY(1px); }

    /* ── Alert ── */
    .alert {
      padding: 12px 16px;
      font-size: .85rem;
      margin-bottom: 20px;
      border-left: 4px solid var(--red);
      background: #fff5f5;
      color: var(--red);
      display: none;
      font-weight: 500;
    }
    .alert.show { display: block; }

    /* ── Register link ── */
    .register-link {
      text-align: center;
      font-size: .83rem;
      color: var(--gray-3);
      padding: 0 32px 28px;
    }
    .register-link a {
      color: var(--black);
      font-family: 'Rubik', sans-serif;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 1px;
    }
    .register-link a:hover { color: var(--gold); }

    /* ── Footer ── */
    footer {
      background: var(--black);
      color: #555;
      text-align: center;
      padding: 22px 20px;
      font-size: .8rem;
      border-top: 3px solid var(--gold);
    }
    footer strong { color: var(--white); }

    @media (max-width: 480px) {
      header { padding: 0 16px; }
      .login-body { padding: 24px; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">
    <img src="https://cdn11.bigcommerce.com/s-w94u0bjkb6/images/stencil/original/recurso_1_1757027375__15872.original.png"
         alt="Ultra1Plus Logo"
         onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
    <span style="display:none; font-family:'Rubik',sans-serif; font-weight:800; font-size:1.4rem; color:#fff;">Ultra<span style="color:#FFC700">1</span>Plus</span>
  </div>
  <div class="page-title">Client <span>Order</span> Portal</div>
</header>

<div class="login-wrap">
  <div class="login-box">
    <div class="login-head">
      <h2>Sign In to Your Account</h2>
    </div>
    <div class="login-body">
      <div id="login-alert" class="alert"></div>
      <div class="field">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" placeholder="john@company.com"
               autocomplete="email" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" placeholder="Your password"
               autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()" />
      </div>
      <button class="btn-signin" onclick="doLogin()">Sign In &rarr;</button>
    </div>
    <p class="register-link">Don't have an account? <a href="register.html">Request access &rarr;</a></p>
  </div>
</div>

<footer>
  &copy; 2025 <strong>Ultra1Plus</strong> &mdash; All rights reserved.
</footer>

<script>
  // Redirect if already logged in
  (function() {
    const s = JSON.parse(localStorage.getItem('u1p_session') || 'null');
    if (s && s.email) window.location.href = 'order_form.html';
  })();

  function showAlert(msg) {
    const el = document.getElementById('login-alert');
    el.textContent = msg;
    el.classList.add('show');
  }
  function clearAlert() {
    document.getElementById('login-alert').classList.remove('show');
  }

  function doLogin() {
    clearAlert();
    const email    = document.getElementById('login-email').value.trim().toLowerCase();
    const password = document.getElementById('login-password').value;

    if (!email)    return showAlert('Please enter your email address.');
    if (!password) return showAlert('Please enter your password.');

    const customers = (typeof APPROVED_CUSTOMERS !== 'undefined') ? APPROVED_CUSTOMERS : {};
    const record    = customers[email] || customers[Object.keys(customers).find(k => k.toLowerCase() === email)];

    if (!record || record.password !== password) {
      return showAlert('Invalid email or password, or your account is pending approval.');
    }

    // Store session
    localStorage.setItem('u1p_session', JSON.stringify({
      email:       email,
      name:        record.name        || '',
      company:     record.company     || '',
      phone:       record.phone       || '',
      address:     record.address     || '',
      pricingFile: record.pricingFile || null
    }));

    window.location.href = 'order_form.html';
  }
</script>

</body>
</html>
